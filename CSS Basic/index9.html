<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling Lists Using CSS</title>
    <style>
        nav ul li {
            /* list-style: none; */
            list-style: devanagari;
            list-style-type: armenian;
            /* We can set emoji also  */
            background-color: yellow;
            list-style-position: inside;
            /* Because of this number or cricle etc get inside the colour and border */
            border: 2px solid black;
            list-style-image: url("C:\Users\swati\Desktop\web dev\HTML Basic\cat.jpg");
            /* Because of this image is show beside marker(list text) */
        }
    </style>
</head>

<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>

</body>

</html>
