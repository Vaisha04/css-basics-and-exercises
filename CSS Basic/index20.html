<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations</title>
    <style>
        .container {
            background-color: rgb(102, 222, 222);
            height: 80vh;
            width: 30vw;
        }

        .box {
            width: 34px;
            height: 45px;
            /* background-color: aqua; */
            /* animation has name duration timing-function delay iteration-count direction fill-mode etc. property*/

            /* animation-name: Animation; */
            /* It tell as animation name which we made below */

            /* animation-duration: 3s;
            animation-iteration-count: 3; */
            /* It repeate animation*/
            /* You can even make animation infinte by written down */

            /* animation-timing-function: ease-out;
            animation-delay: 1s; */

            /* animation-direction: reverse; */
            /* It will start animation reverse */

            /* animation-direction: alternate-reverse; */
            /* It will start from both direction one by one 
            means if it start from left to right first time then it will start right to left next time */

            /* animation-play-state: paused; */
            /* It will stop animation */
            /* animation-play-state: running; */
            /* It will run animation */

            /* animation-fill-mode: forwards; */
            /* Specifies how the styles of an animation are applied before and after the animation runs 
            none - No style is applied before or after animation
            forwards - Keeps the final style after animation ends
            backwards - Applies the starting style before animation begins
            both - Applies both starting and ending styles*/

            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            animation: Animation 3s ease-in-out 1s 1,
                Animation2 3s ease-in-out 3s 1;
            /* This are 2nd way to right all property in one sentence */
        }

        @keyframes Animation {
            from {
                background-color: red;
            }

            to {
                background-color: yellow;
                transform: translateX(1000px);
            }
        }

        @keyframes Animation2 {
            0% {
                transform: rotate(100deg);
            }

            20% {
                transform: rotate(200deg);
            }

            50% {
                transform: rotate(220deg);
            }

            80% {
                transform: rotate(300deg);
            }

            100% {
                transform: rotate(310deg);
            }
        }


        /* Above are animation which we made and it has name Animation and Animation2*/
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            Box
        </div>
    </div>
</body>

</html>
