<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        div,
        span {
            /* Selector */
            color: red;
            /* Declaration */
            background-color: yellow;
        }
    </style>
</head>

<body>
    <div>
        Hey I am happy and today I am in CSS mood
    </div>
    <div>
        Hey I am good
    </div>

        I am good
    </span>

    </p>
</body>

</html>
