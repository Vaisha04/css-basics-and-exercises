<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            border: 2px solid blue;
            display: inline-block;
            /* Block element become inline element */
            /* If you want to give it width and height and also it should be display on page use inline block for/in display */
            padding: 45px;
            margin: 34px;
            width: 344px;
        }

        .box1 {
            /* display: none; */
            /* Beacause of this these box will disapper from web  */
            /* visibility: hidden; */
            /* Beacause of this these box will disapper from web page but it space will remain*/
        }
    </style>
</head>

<body>
    <!-- https://developer.mozilla.org/en-US/docs/Web/CSS/display -->
    <div class="box box1">
        I am a box
    </div>
    <div class="box">
        also a nice box
    </div>
    <span>I am good</span>
    <span>boy</span>

</body>

</html>
