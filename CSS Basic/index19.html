<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transition Property</title>
    <style>
        .container {
            background-color: antiquewhite;
            width: 50vw;
            height: 40vh;
        }

        .box {
            background-color: aquamarine;
            width: 5vw;
            height: 4vh;

            /* transition-property: transfrom; */
            /* This property will effect only transfrom which is in .translate style */

            /* transition-property: all; */
            /* It include all property */

            /*  transition-property: transform, background-color; */
            /* It include only this two property */
            /* This property will effect all thing in .translate style which is transform ,background color */
            /* Specifies which CSS property will change with transition */

            /* transition-duration: 3s; */
            /* Specifies how long the transition effect takes to complete */

            /* transition-timing-function: ease-in-out; */
            /* transition-timing-function: cubic-bezier(0.165, 0.84, 0.44, 1); */
            /* This are two way to write
            You can even make your own function */
            /* Specifies the speed curve of the transition(how the animation progresses) */

            /* transition-delay: 1s; */
            /* Specifies how long to wait before the transition starts */

            transition: all 3s ease-in-out 1s;
            /* This are way to write all property in one */
        }

        .translate {
            transform: translateX(10vw) translateY(10vh) scale(2);
            background-color: blue;
        }
    </style>
</head>

<body>
    <!-- Transition in CSS means a smooth change from one style value to another over a specified time -->
    <div class="container">
        <div class="box translate"></div>
    </div>
</body>

</html>
