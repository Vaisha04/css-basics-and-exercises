<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body {
            background-color: gray;
            padding: 45px;
        }

        .card {
            background-color: white;
            width: 198px;
            height: 294px;
            border-radius: 7px;
            padding: 0 0 34px 0;
        }

        .image {
            padding: 5px;
        }

        .image img {
            border-radius: 7px;
        }

        .content {
            padding: 7px 13px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .content p {
            font-size: 11px;
            color: gray;
        }

        .capsules{
            padding: 0 28px 0 14px;
        }
        .capsules span {
            border: 1px solid gray;
            padding: 3px 10px;
            border-radius: 7px;
            font-size: 10px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .button{
            text-align: center;
        }
        .button button{
            padding: 7px 9px;
            border-radius: 15px;
            background-color: rgb(212, 212, 252);
            color: rgb(91, 91, 177);
            font-size: 10px;
            border: none;
            margin-top: 7px;
            font-weight: bold;
            cursor: pointer;
        }

        .button button:hover{
            background-color: rgb(177, 237, 196);
            color: rgb(40, 218, 79);
        }
    </style>
</head>

<body>
    <!-- CSS Card Design -->
    <div class="card">

        <div class="image">
            <img width="188px" src="C:\Users\swati\Desktop\boat1.avif">
        </div>

        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>

        <div class="content">
            <h2>Heading</h2>
            <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. At quam eum dolor ipsam, ut, quod officia
                nostrum voluptatibus reprehenderit suscipit, nobis sed assumenda.</p>
        </div>

        <div class="button">
            <button>Read More</button>
        </div>
    </div>
</body>

</html>
